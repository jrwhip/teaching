  <script>
    function changeBackgroundColor(color) {
      document.body.style.backgroundColor = color;

      // Get the button element
      let themeButton = document.querySelector(".dropbtn");

      // Function to darken the color slightly
      function darkenColor(hex, percent) {
          let r = parseInt(hex.substring(1, 3), 16);
          let g = parseInt(hex.substring(3, 5), 16);
          let b = parseInt(hex.substring(5, 7), 16);

          r = Math.max(0, Math.min(255, r - (r * percent / 100)));
          g = Math.max(0, Math.min(255, g - (g * percent / 100)));
          b = Math.max(0, Math.min(255, b - (b * percent / 100)));

          let darkenedHex = `#${((1 << 24) + (Math.round(r) << 16) + (Math.round(g) << 8) + Math.round(b)).toString(16).slice(1)}`;
          return darkenedHex;
      }

      let darkerColor = darkenColor(color, 20);
      themeButton.style.backgroundColor = darkerColor;
      themeButton.style.color = "#ffffff";
    }

function generateFractionTimesNProblemSimplified() {
  // Example constraints:
  // B in [4..9]
  const B = Math.floor(Math.random() * 6) + 4;  // random 4..9
  // C in [2..8]
  const C = Math.floor(Math.random() * 7) + 2;  // random 2..8

  // A is chosen so it's never equal to B:
  //  - 50% of the time we pick A in [2..(B-1)]
  //  - otherwise, pick A in [(B+1)..10].
  let A;
  const coinToss = Math.random() < 0.5;
  if (coinToss && B > 2) {
    // A in [2..(B-1)]
    const lower = 2;
    const upper = B - 1;
    const rangeSize = upper - lower + 1;
    A = lower + Math.floor(Math.random() * rangeSize);
  } else {
    // A in [(B+1)..10]
    const lower = B + 1;
    const upper = 10;
    const rangeSize = upper - lower + 1;
    A = lower + Math.floor(Math.random() * rangeSize);
  }

  // Build question text with fraction A/B
  // For example: "(A/B) * n = C. Solve for n."
  const questionText = `
   
    <span class="frac">
      <sup>${A}</sup>
      <sub>${B}</sub>
    </span>
    n = ${C}.
    <br>
    Enter <em>n</em> as a simplified fraction.
  `;

  // Correct fraction (unreduced):
  //   numerator = C * B
  //   denominator = A
  const rawNum = C * B;
  const rawDen = A;

  // Reduce fraction to simplest form:
  //   n = (rawNum / gcd) / (rawDen / gcd)
  const gcdVal = gcd(rawNum, rawDen);
  const correctNum = rawNum / gcdVal;
  const correctDen = rawDen / gcdVal;

  // We'll store the fraction as a string, e.g. "3/4"
  const correctAnswerString = `${correctNum}/${correctDen}`;

  // Provide a hint
  const hintText = `
    Hint: Multiply both sides by
    <span class="frac">
      <sup>${B}</sup>
      <sub>${A}</sub>
    </span>
    to isolate <em>n</em>.
    <br>
    Then simplify the fraction.
  `;

  // Validation: require user to enter a simplified fraction "p/q" that matches correctNum/correctDen
  function validateFn(userInput) {
    // parse the user’s fraction
    let parsed = parseFractionToSimplest(userInput);
    if (!parsed) return false; // parse failed or invalid

    let { num: userNum, den: userDen } = parsed;

    // Must exactly match correctNum/correctDen
    return userNum === correctNum && userDen === correctDen;
  }

  return {
    text: questionText,
    answer: correctAnswerString, // e.g. "3/4"
    hint: hintText,
    validate: validateFn
  };
}

function parseFractionToSimplest(str) {
  let input = str.trim();
  if (!input) return null;

  // If there's no slash, treat it like an integer fraction e.g. "3" => 3/1
  if (!input.includes('/')) {
    let integerVal = parseInt(input, 10);
    if (isNaN(integerVal)) return null; // not a valid integer
    // reduce(3, 1) => { num: 3, den: 1 }
    return reduceFraction(integerVal, 1);
  }

  // Otherwise, must match "p/q"
  let parts = input.split('/');
  if (parts.length !== 2) return null;

  let p = parseInt(parts[0], 10);
  let q = parseInt(parts[1], 10);
  if (isNaN(p) || isNaN(q) || q === 0) {
    return null;
  }

  return reduceFraction(p, q);
}
function gcd(a, b) {
  a = Math.abs(a);
  b = Math.abs(b);
  while (b !== 0) {
    let tmp = a % b;
    a = b;
    b = tmp;
  }
  return a;
}
function reduceFraction(num, den) {
  let g = gcd(num, den);
  return {
    num: num / g,
    den: den / g
  };
}

// Add the new problems to your quiz
function generateSimplifyExpressionProblem() {
    let variables = ["x", "y", "z"]; // Possible variables
    let chosenVars = [];
    let terms = [];
    let numericSum = 0;

    // Choose 1 or 2 unique variables
    let numVars = Math.random() < 0.5 ? 1 : 2;
    let availableVars = [...variables];

    for (let i = 0; i < numVars; i++) {
        let randomIndex = Math.floor(Math.random() * availableVars.length);
        let variable = availableVars.splice(randomIndex, 1)[0];
        chosenVars.push(variable);
    }

    // Generate exactly 5 terms
    for (let i = 0; i < 5; i++) {
        let coef = Math.floor(Math.random() * 10) - 5; // Range -5 to 5
        if (coef === 0) coef = 1; // Ensure no zero coefficients

        if (i < 4) {
            // Assign first 4 terms to chosen variables
            let variable = chosenVars[Math.floor(Math.random() * chosenVars.length)];
            terms.push({ term: `${coef === 1 ? "" : coef === -1 ? "-" : coef}${variable}`, coef, variable });
        } else {
            // Last term is a constant
            terms.push({ term: `${coef}`, coef, variable: null });
            numericSum += coef;
        }
    }

    // Combine like terms
    let simplifiedTerms = {};
    terms.forEach(t => {
        if (t.variable) {
            if (!simplifiedTerms[t.variable]) simplifiedTerms[t.variable] = 0;
            simplifiedTerms[t.variable] += t.coef;
        }
    });

    // Build correct simplified expression
    let correctTerms = [];
    Object.keys(simplifiedTerms).forEach(variable => {
        let coef = simplifiedTerms[variable];
        if (coef !== 0) {
            correctTerms.push(`${coef === 1 ? "" : coef === -1 ? "-" : coef}${variable}`);
        }
    });

    if (numericSum !== 0) {
        correctTerms.push(numericSum.toString());
    }

    // Shuffle question display
    let shuffledTerms = [...terms.map(t => t.term)].sort(() => Math.random() - 0.5);

    // Generate all valid orderings of the correct answer
    let correctAnswerVariants = generateAnswerPermutations(correctTerms);

    let questionText = `Simplify:<br>${shuffledTerms.join(" + ").replace(/\+\s-/g, "- ")}<br>`;

    let hintText = "Hint: Combine like terms.";

    function validateFn(userInput) {
        let cleanedInput = normalizeExpression(userInput);
        return correctAnswerVariants.has(cleanedInput);
    }

    return {
        text: questionText,
        answer: correctTerms.join(" + ").replace(/\+\s-/g, "- "),
        hint: hintText,
        validate: validateFn
    };
}

// Normalize an expression string to allow order-independent checking
function normalizeExpression(expression) {
    return expression
        .replace(/\s+/g, "") // Remove spaces
        .replace(/-/g, " -")  // Ensure negatives are separated
        .replace(/\+/g, " +") // Ensure positives are separated
        .split(/\s+/)         // Split by space
        .filter(Boolean)      // Remove empty elements
        .sort()               // Sort for consistent ordering
        .join("+")            // Rejoin as a sorted expression
        .replace(/\+\s-/g, "- ") // Fix signs
        .replace(/\+\+/g, "+");  // Fix double plus signs
}

// Generate all possible permutations of correct answers
function generateAnswerPermutations(terms) {
    let permutations = new Set();
   
    function permute(arr, prefix = []) {
        if (arr.length === 0) {
            permutations.add(normalizeExpression(prefix.join("+")));
        } else {
            for (let i = 0; i < arr.length; i++) {
                let newArr = arr.slice(0, i).concat(arr.slice(i + 1));
                permute(newArr, prefix.concat(arr[i]));
            }
        }
    }

    permute(terms);
    return permutations;
}

      return generateFractionTimesNProblemSimplified();
    case 6:
      return generateFractionTimesNProblem();
    case 7:
      return generateNOverEqualsNumberProblem();
    case 8:
      return generateDecimalNOverEqualsNumberProblem();
    case 9:
      return generateSimplifyExpressionProblem();
    case 10:
      return generateDistributeExpressionProblem();
    default:
      return generateEquationNOverAProblem();
  }
}





    function updateStreak(index, correct) {
    let streaks = document.querySelectorAll(`#problem${index} .correct-streak span`);
   
    if (correct) {
        let filled = Array.from(streaks).filter(span => span.textContent === "✔").length;

        if (filled < 2) {
            streaks[filled].textContent = "✔";
        } else {
            streaks[filled].textContent = "✔";

            // Disable current problem
            document.getElementById(`problem${index}`).classList.add("disabled");

            // If in zoom mode, close it after 300ms
            if (zoomedProblemIndex === index) {
                setTimeout(() => {
                    closeZoom();
                }, 300);
            }

            // Move cursor to the next available problem
            setTimeout(() => focusNextProblem(index), 300);
        }
    } else {
        streaks.forEach(span => span.textContent = ""); // Reset on incorrect attempt
    }
}


function focusNextProblem(index) {
    let nextIndex = index + 1;
   
    while (nextIndex <= 10) { // Assuming 10 problems
        let nextInput = document.getElementById(`answer${nextIndex}`);
       
        if (nextInput && !document.getElementById(`problem${nextIndex}`).classList.contains("disabled")) {
            nextInput.focus();
            break; // Stop once the next available input is found
        }
       
        nextIndex++;
    }
}



    function checkAnswer(index) {
      let inputField = document.getElementById(`answer${index}`);
      let userInput = inputField.value.trim();
      let hintDiv = document.getElementById(`hint${index}`);

      if (!problems || !problems[index - 1]) {
          console.error(`Problem ${index} not found.`);
          return;
      }

      let problem = problems[index - 1];
      let isCorrect = problem.validate(userInput);

      if (isCorrect) {
        updateStreak(index, true);
        hintDiv.style.display = "none";
        inputField.value = "";

        // Generate a new problem
        let newProblem = generateProblem(index);
        problems[index - 1] = newProblem;

        // --- IMPORTANT: use .innerHTML, not textContent ---
        document.querySelector(`#problem${index} .problem-text`).innerHTML = newProblem.text;
        inputField.setAttribute("data-answer", newProblem.answer);
        hintDiv.innerHTML = newProblem.hint;
        hintDiv.style.display = "none";

      } else {
        updateStreak(index, false);
        hintDiv.style.display = "block";
      }
    }

    function handleEnter(event, index) {
      if (event.key === "Enter") {
        checkAnswer(index);
      }
    }

    let problems = [];

    function initializeProblems() {
    let problemsDiv = document.getElementById('problems');
    problems = [];
    problemsDiv.innerHTML = "";

    for (let i = 1; i <= 10; i++) {
        let problem = generateProblem(i);
        problems.push(problem);

        let problemHTML = `
        <div class="problem" id="problem${i}">
            <div class="problem-header">
                <label>Problem ${i}:</label>
                <div class="correct-streak">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <br>
            <span class="problem-text">${problem.text}</span>
            <br>
            <input type="text" id="answer${i}" data-answer="${problem.answer}" onkeydown="handleEnter(event, ${i})">
            <button onclick="checkAnswer(${i})">Check</button>
            <button onclick="zoomProblem(${i})">🔍 Zoom</button>
            <div class="hint" id="hint${i}">${problem.hint}</div>
        </div>
        `;

        problemsDiv.innerHTML += problemHTML;
    }
}

let zoomedProblemIndex = null;

function zoomProblem(index) {
    let problem = problems[index - 1];

    document.getElementById("zoomedProblemContent").innerHTML = problem.text;
    document.getElementById("zoomedAnswer").value = "";
    document.getElementById("zoomedHint").innerHTML = problem.hint;
    document.getElementById("zoomedHint").style.display = "none";

    zoomedProblemIndex = index;

    document.getElementById("zoomModal").style.display = "flex";

    // Focus the cursor in the input box after a short delay
    setTimeout(() => {
        document.getElementById("zoomedAnswer").focus();
    }, 100);
}


function closeZoom() {
    document.getElementById("zoomModal").style.display = "none";
    zoomedProblemIndex = null; // Reset so normal problems work again
}


function checkZoomedAnswer() {
    if (zoomedProblemIndex === null) return;

    let userInput = document.getElementById("zoomedAnswer").value.trim();
    let problem = problems[zoomedProblemIndex - 1];

    let isCorrect = problem.validate(userInput);
    let hintDiv = document.getElementById("zoomedHint");

    if (isCorrect) {
        updateStreak(zoomedProblemIndex, true);
        hintDiv.style.display = "none";
        document.getElementById("zoomedAnswer").value = ""; // Clear input field

        // Generate a new problem and keep zoomed-in mode active
        let newProblem = generateProblem(zoomedProblemIndex);
        problems[zoomedProblemIndex - 1] = newProblem;

        // Update zoom modal with new problem
        document.getElementById("zoomedProblemContent").innerHTML = newProblem.text;
        document.getElementById("zoomedHint").innerHTML = newProblem.hint;
        document.getElementById("zoomedHint").style.display = "none";

    } else {
        updateStreak(zoomedProblemIndex, false);
        hintDiv.style.display = "block";
    }
}


function handleZoomedEnter(event) {
    if (event.key === "Enter") {
        checkZoomedAnswer();
    }
}




   window.onload = function() {
    initializeProblems();
    changeBackgroundColor('#d3d3d3'); // Set default to Light Gray
    closeZoom(); // Ensure zoom is closed on load
};
