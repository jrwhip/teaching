<div class="section">
  <div class="container" style="max-width: 900px;">
    <div class="card card-flat">
      <div class="card-header">
        <h3 class="mb-0">Number Rounding Game</h3>
      </div>
      <div class="card-body">
        <h4 class="mb-2">
          Round the number below to the nearest:
          {{ roundingFactor | nthPlainText }}
        </h4>
        <p class="display-heading" style="font-size: 2.5rem;">{{ randomNumber | number }}</p>

        <div class="input-group mb-3" style="max-width: 400px;">
          <input
            type="number"
            pattern="[0-9]*"
            inputmode="numeric"
            class="form-input"
            [(ngModel)]="userAnswer"
            placeholder="Enter your answer"
            aria-label="Enter your answer"
            (keydown.enter)="checkAnswer(userAnswer)"
          />
          <button
            class="btn btn-outline"
            type="button"
            (click)="checkAnswer(userAnswer)"
          >
            Check Answer
          </button>
        </div>

        @if (result) {
          <p class="fw-bold" [style.color]="resultColor" style="font-size: var(--text-xl);">{{ result }}</p>
        }

        <app-streak-display [current]="correctStreak" [best]="highestStreak" />
      </div>
    </div>

    <div class="card card-flat mt-4">
      <div class="card-header">
        <h4 class="mb-0">Answer History</h4>
      </div>
      <div class="card-body p-0">
        <ag-grid-angular
          style="width: 100%; height: 500px"
          class="ag-theme-alpine"
          [rowData]="roundedNumbers"
          [columnDefs]="columnDefs"
        >
        </ag-grid-angular>
      </div>
    </div>
  </div>
</div>
