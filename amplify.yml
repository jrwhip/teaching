version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - corepack enable
        - pnpm install --frozen-lockfile
        - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID 2>&1 | grep -v "CREATE_IN_PROGRESS\|CREATE_COMPLETE\|UPDATE_IN_PROGRESS\|UPDATE_COMPLETE"
frontend:
  phases:
    build:
      commands:
        - nvm use 20
        - pnpm build
    postBuild:
      commands:
        - ls -la dist/word-list/browser/ | head -5 || echo "ERROR: dist/word-list/browser/ not found"
  artifacts:
    baseDirectory: dist/word-list/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
