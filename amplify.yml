version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm install --frozen-lockfile
        - npx ampx generate outputs --app-id d2pf03dad8637l --branch $AWS_BRANCH
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: dist/word-list/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
