version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - corepack enable
        - pnpm install --frozen-lockfile
        - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: dist/word-list/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
