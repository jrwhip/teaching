version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - corepack enable
        - pnpm install --frozen-lockfile
        - pnpm exec ampx generate outputs --app-id $AWS_APP_ID --branch $AWS_BRANCH
    build:
      commands:
        - "pnpm exec ng build --no-progress &"
        - sleep 45
        - ls -la dist/word-list/browser/index.html
  artifacts:
    baseDirectory: dist/word-list/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
