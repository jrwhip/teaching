version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - rm -rf node_modules
        - npm install
        - find node_modules/@aws-amplify -path "*/node_modules/graphql" -type d -exec rm -rf {} + 2>/dev/null || true
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - npx ng build --configuration=production
  artifacts:
    baseDirectory: dist/word-list/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
