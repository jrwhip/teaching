version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - corepack enable
        - corepack prepare pnpm@10.24.0 --activate
        - rm -rf node_modules package-lock.json
        - pnpm install --frozen-lockfile
        - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - NG_CLI_ANALYTICS=false pnpm exec ng build --configuration=production --no-progress
  artifacts:
    baseDirectory: dist/word-list/browser
    files:
      - '**/*'
  cache:
    paths: []
